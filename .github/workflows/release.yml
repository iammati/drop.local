name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — universal binary covers both arm64 + x86_64 via Rosetta
          # For a true native split, Electrobun builds per-runner arch.
          - name: macOS (arm64)
            runner: macos-15        # M-series runner (arm64), GA since 2024
            platform: mac
            arch: arm64
            artifact: drop-local-macos-arm64

          - name: macOS (x86_64)
            runner: macos-13        # Last Intel runner
            platform: mac
            arch: x86_64
            artifact: drop-local-macos-x86_64

          - name: Linux (x86_64)
            runner: ubuntu-24.04
            platform: linux
            arch: x86_64
            artifact: drop-local-linux-x86_64

          - name: Linux (arm64)
            runner: ubuntu-24.04-arm # Native arm64 runner, GA since 2025
            platform: linux
            arch: arm64
            artifact: drop-local-linux-arm64

          - name: Windows (x86_64)
            runner: windows-2025
            platform: win
            arch: x86_64
            artifact: drop-local-windows-x86_64

          - name: Windows (arm64)
            runner: windows-11-arm  # Native arm64 runner, GA since 2025
            platform: win
            arch: arm64
            artifact: drop-local-windows-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend (Vite)
        run: bun run build

      - name: Build app (Electrobun)
        run: bunx electrobun build --env=stable

      # ── macOS: code sign + notarize (skip if secrets not set) ──────────────
      - name: Sign & notarize (macOS)
        if: matrix.platform == 'mac' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k actions build.keychain
          APP=$(find .electrobun -name "*.app" | head -1)
          codesign --deep --force --options runtime \
            --sign "Developer ID Application: $APPLE_TEAM_ID" "$APP"
          ditto -c -k --keepParent "$APP" "${APP%.app}.zip"
          xcrun notarytool submit "${APP%.app}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP"

      # ── Locate build output & package into a single archive ────────────────
      - name: Package artifact (macOS)
        if: matrix.platform == 'mac'
        run: |
          APP=$(find .electrobun -name "*.app" | head -1)
          ditto -c -k --keepParent "$APP" "${{ matrix.artifact }}.zip"

      - name: Package artifact (Linux)
        if: matrix.platform == 'linux'
        run: |
          BIN=$(find .electrobun -maxdepth 4 -type f -executable | head -1)
          tar -czf "${{ matrix.artifact }}.tar.gz" -C "$(dirname "$BIN")" "$(basename "$BIN")"

      - name: Package artifact (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse .electrobun -Filter *.exe | Select-Object -First 1
          Compress-Archive -Path $exe.FullName -DestinationPath "${{ matrix.artifact }}.zip"

      # ── Upload to GitHub Release ────────────────────────────────────────────
      - name: Upload release asset (zip)
        if: matrix.platform == 'mac' || matrix.platform == 'win'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
          generate_release_notes: true

      - name: Upload release asset (tar.gz)
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.tar.gz
          generate_release_notes: true
